name: Publish Yalla Score

# Runs on GitHub's servers (free, no PC needed). Fetches latest news + matches,
# rebuilds the static site, and deploys it to Cloudflare.
on:
  schedule:
    - cron: "5,35 * * * *"      # twice an hour (GitHub cron can be delayed a bit)
  workflow_dispatch: {}          # allows a manual run from the Actions tab

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch latest content (news + matches)
        env:
          FD_TOKEN: ${{ secrets.FD_TOKEN }}
        run: python fetch_data.py

      - name: Build the static site
        run: python build_site.py

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
